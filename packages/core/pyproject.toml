[project]
name = "micracode-core"
version = "0.1.0"
description = "Micracode core engine: LLM orchestration, storage, and code-generation logic."
requires-python = ">=3.12"
authors = [{ name = "Micracode" }]
license = { text = "MIT" }
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Code Generators",
]
dependencies = [
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "python-dotenv>=1.0.1",
    "httpx>=0.27.0",
    "langchain-core>=0.3.0",
    "langchain-google-genai>=2.0.0",
    "langchain-openai>=0.2.0",
    "langchain-ollama>=0.2.0",
]

[project.urls]
Homepage = "https://github.com/Jamessdevops/micracode"
Source   = "https://github.com/Jamessdevops/micracode"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/micracode_core"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "BLE", "UP", "N", "SIM", "RUF"]
ignore = ["E501"]
